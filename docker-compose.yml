services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clipforge
      POSTGRES_USER: clipforge
      POSTGRES_PASSWORD: clipforge
    ports:
      - "5432:5432"
    volumes:
      - clipforge_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clipforge -d clipforge"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      CLIPFORGE_DATABASE_URL: postgresql+psycopg://clipforge:clipforge@postgres:5432/clipforge
      CLIPFORGE_FRONTEND_PUBLIC_DIR: apps/frontend/public
      CLIPFORGE_GENERATED_STORAGE_DIR: backend/storage/generated
      CLIPFORGE_GENERATED_BASE_URL: /generated
      CLIPFORGE_TRANSCRIPTION_DEVICE: cuda
      CLIPFORGE_TRANSCRIPTION_COMPUTE_TYPE: float16
      CLIPFORGE_PIPER_BINARY: /app/models/piper/piper
      CLIPFORGE_PIPER_VOICE: /app/models/voices/en_US-lessac-medium.onnx
      CLIPFORGE_WAV2LIP_DIR: /app/models/wav2lip/src
      CLIPFORGE_WAV2LIP_CHECKPOINT: /app/models/wav2lip/checkpoints/wav2lip_gan.pth
      CLIPFORGE_WAV2LIP_BOX: 300 720 130 620
      CLIPFORGE_LIPSYNC_COMMAND: python3 /app/backend/scripts/lipsync_pipeline.py --video-path {video_path} --script {script} --output-path {output_path} --language {language} --voice {voice}
    ports:
      - "8088:8088"
    gpus: all
    volumes:
      - generated_media:/app/backend/storage/generated
      - ./models:/app/models
      - ./backend:/app/backend
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    command: http frontend:80
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    ports:
      - "4040:4040"
    depends_on:
      - frontend
    profiles:
      - public

volumes:
  clipforge_postgres:
  generated_media:
