services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clipforge
      POSTGRES_USER: clipforge
      POSTGRES_PASSWORD: clipforge
    ports:
      - "5432:5432"
    volumes:
      - clipforge_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clipforge -d clipforge"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  clipforge_postgres:
